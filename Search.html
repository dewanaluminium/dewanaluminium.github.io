  <style>
    body { 
      background-color: #050505; 
      color: #ffffff; 
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;

    .header-toko { 
      background: linear-gradient(135deg, #020b06 0%, #062416 50%, #0d47a1 100%); 
      color: #ffffff; 
      padding: 40px 15px 65px 15px; 
      text-align: center; 
      border-bottom: 3px solid #00ff87; 
      box-shadow: 0 4px 15px rgba(0, 255, 135, 0.2);
    }
    
    .header-toko h2 { 
      font-weight: 800; 
      letter-spacing: 1.5px; 
      text-transform: uppercase; 
      text-shadow: 0 4px 6px rgba(0,0,0,0.8); 
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
    }
    
    /* CSS UNTUK LOGO BASE64 */
    .logo-base64 {
      height: 45px; 
      width: auto;
      object-fit: contain;
      border-radius: 8px; 
    }

    .header-toko p { color: #a7f3d0; font-size: 1.1rem; }
    
    .search-wrapper { 
      max-width: 800px; 
      margin: -40px auto 20px auto; 
      background: rgba(10, 17, 13, 0.85); 
      backdrop-filter: blur(10px); 
      padding: 20px; 
      border-radius: 12px; 
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.9); 
      border: 1px solid #113620;
    }
    
    .input-group-custom { display: flex; gap: 15px; align-items: center; }

    .search-wrapper input { 
      background-color: #000000;
      border: 1px solid #113620;
      color: #ffffff;
      border-radius: 8px; 
      font-size: 1.05rem; 
    }
    .search-wrapper input:focus {
      background-color: #050505;
      color: #ffffff;
      border-color: #00ff87;
      box-shadow: 0 0 0 0.25rem rgba(0, 255, 135, 0.2);
    }
    .search-wrapper input::placeholder { color: #4b6b58; }
    
    .item-count-badge {
      background-color: #02140a;
      border: 1px solid #00ff87;
      color: #00ff87;
      padding: 0 20px;
      border-radius: 8px;
      font-weight: 600;
      white-space: nowrap;
      display: flex;
      align-items: center;
      height: 48px; 
      box-shadow: inset 0 0 10px rgba(0, 255, 135, 0.1);
    }
    
    .btn-clear {
      position: absolute; right: 15px; top: 50%;
      transform: translateY(-50%); background: none;
      border: none; color: #4b6b58; z-index: 10; display: none; 
    }
    .btn-clear:hover { color: #00ff87; }
    
    .table-card {
      background: #000000; border-radius: 12px; padding: 0;
      box-shadow: 0 4px 20px rgba(0, 255, 135, 0.08); 
      overflow: hidden; margin-bottom: 40px; border: 1px solid #113620;
    }
    
    .table { margin-bottom: 0; --bs-table-bg: transparent; color: #ffffff; }
    .table thead th { 
      background-color: #020b06 !important; color: #00ff87; font-weight: 700; 
      text-transform: uppercase; font-size: 0.85rem; letter-spacing: 1px;
      position: sticky; top: 0; z-index: 5;
      border-bottom: 2px solid #00ff87 !important; padding: 15px 10px;
    }
    
    .table tbody tr { background: linear-gradient(90deg, #000000 0%, #061c0e 50%, #000000 100%); transition: all 0.2s ease-in-out; }
    .table tbody td { border-bottom: 1px solid #0a2614 !important; padding: 16px 10px; color: #ffffff !important; background-color: transparent !important; vertical-align: middle; }
    .table tbody tr:hover { background: linear-gradient(90deg, #02140a 0%, #0c381c 50%, #02140a 100%); transform: scale(1.005); } 
    
    .harga-text { color: #00ff87 !important; font-weight: 700; font-size: 1.1rem; } 
    .nama-barang { font-weight: 600; color: #f8f9fa !important; font-size: 1.05rem; }
    .kolom-satuan { color: #8bb39b !important; font-size: 0.9rem; }
    
    .table-container-scroll { max-height: 65vh; overflow-y: auto; }
    .table-container-scroll::-webkit-scrollbar { width: 8px; }
    .table-container-scroll::-webkit-scrollbar-track { background: #000000; }
    .table-container-scroll::-webkit-scrollbar-thumb { background: #113620; border-radius: 4px; }
    .table-container-scroll::-webkit-scrollbar-thumb:hover { background: #00ff87; }
    
    .badge-stok-ada { background-color: #00ff87; color: #000000; font-weight: 800; font-size: 0.85rem; letter-spacing: 0.5px; }
    .badge-stok-habis { background-color: #ff4d4d; color: #ffffff; font-weight: 800; font-size: 0.85rem; letter-spacing: 0.5px; }
    
    .floating-wa {
      position: fixed; bottom: 25px; right: 25px; background-color: #25D366; color: white;
      width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center;
      justify-content: center; font-size: 32px; box-shadow: 0 4px 15px rgba(37, 211, 102, 0.4);
      z-index: 1000; transition: all 0.3s ease; text-decoration: none;
    }
    .floating-wa:hover { background-color: #1ebe57; color: white; transform: scale(1.1); box-shadow: 0 6px 20px rgba(37, 211, 102, 0.6); }
    
    .footer { text-align: center; padding: 25px; color: #4b6b58; font-size: 0.9rem; border-top: 1px solid #0a2614; margin-top: 20px;}
    #statusSync { display: none; font-size: 0.85rem; color: #00ff87; margin-top: 10px; font-weight: bold;}
    
    @media (max-width: 768px) {
      .input-group-custom { flex-direction: column; align-items: stretch; }
      .item-count-badge { justify-content: center; }
    }
  </style>

  <script>
    // ⚠️ MASUKKAN URL GOOGLE SCRIPT (WEB APP) KAMU DI SINI ⚠️
    // Jangan hapus parameter action, sheet, dan key yang sudah saya susun di bawah.
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxcXnRPIUzCEWqK_zssMjDGxiZr_ymS5Js2pDgX8IT8aP5Az7YTV3hSgLxNueBbx36ZJQ/exec";
    const API_KEY = "dewan123";
    const NAMA_SHEET = "Barang"; // Sesuaikan jika nama sheet di Google Sheet berbeda
    
    // URL Penuh untuk JSONP (Fungsi callback diatur ke 'prosesDataJSONP')
    const URL_API_KASIR = `${SCRIPT_URL}?action=search&sheet=${NAMA_SHEET}&key=${API_KEY}&callback=prosesDataJSONP`;
    
    let dataKatalogAsli = [];
    let timeoutKetik = null;

    const kolomCari = document.getElementById('kolomCari');
    const btnClear = document.getElementById('btnClear');
    const infoJumlah = document.getElementById('infoJumlah');

    window.onload = function() {
      const dataLama = localStorage.getItem('katalog_dewan_db2');
      
      if (dataLama) {
        dataKatalogAsli = JSON.parse(dataLama);
        tampilkanUI();
        prosesDataDanRender(); 
        document.getElementById('statusSync').style.display = 'block';
      }

      // Mengambil data menggunakan metode Script Injection untuk JSONP
      const script = document.createElement('script');
      script.src = URL_API_KASIR;
      
      // Menangani error jika script gagal dimuat (misal tidak ada internet)
      script.onerror = function() {
        if(!dataLama) { 
          document.getElementById('statusLoading').innerHTML = "<span class='text-danger'><i class='bi bi-exclamation-triangle-fill me-2'></i>Gagal terhubung ke server. Periksa koneksi internet Anda.</span>";
        }
        document.getElementById('statusSync').style.display = 'none';
      };

      document.body.appendChild(script);
    };

    // 🟢 FUNGSI CALLBACK JSONP (Dipanggil otomatis oleh server Google)
    window.prosesDataJSONP = function(dataMentah2D) {
      dataKatalogAsli = [];
      
      // Mengubah Array 2D (Kolom dan Baris) menjadi Array Objek
      // Asumsi Kolom Spreadsheet: B(1)=Nama, C(2)=Satuan, E(4)=Harga, F(5)=Stok
      // Kita lewati baris pertama (i=0) karena biasanya berisi Header "Nama Barang", "Harga", dll.
      for (let i = 1; i < dataMentah2D.length; i++) {
        let row = dataMentah2D[i];
        let namaBarang = row[1]; // Kolom B
        
        if (namaBarang && namaBarang.toString().trim() !== "") {
          dataKatalogAsli.push({
            nama: namaBarang.toString().trim(),
            satuan: row[2] || "-", // Kolom C
            harga: row[4] || "",   // Kolom E
            stok: row[6] || 0      // Kolom G
          });
        }
      }

      // Simpan ke Cache
      localStorage.setItem('katalog_dewan_db2', JSON.stringify(dataKatalogAsli));
      
      tampilkanUI();
      document.getElementById('statusSync').style.display = 'none';
      prosesDataDanRender();
    };

    function tampilkanUI() {
      document.getElementById('statusLoading').style.display = 'none';
      document.getElementById('tabelContainer').style.display = 'block';
    }

    // FUNGSI MULTI-KEYWORD SEARCH & TANPA LIMIT
    function prosesDataDanRender() {
      const kataKunciMentah = kolomCari.value.toLowerCase().trim();

      if (kataKunciMentah === "") {
        infoJumlah.innerHTML = `<i class="bi bi-database me-2"></i> <span>${dataKatalogAsli.length}</span> &nbsp;Total`;
        renderTabel([]); // Tetap dikosongkan saat pertama load
        return;
      }

      const arrayKataKunci = kataKunciMentah.split(/\s+/);

      let dataOlahan = dataKatalogAsli.filter(b => {
        const namaBarang = b.nama.toLowerCase();
        return arrayKataKunci.every(kata => namaBarang.includes(kata));
      });

      infoJumlah.innerHTML = `<i class="bi bi-search me-2"></i> <span>${dataOlahan.length}</span> &nbsp;Ditemukan`;
      renderTabel(dataOlahan);
    }

    function renderTabel(data) {
      const tbody = document.getElementById('isiTabel');
      
      if (data.length === 0) {
        if (kolomCari.value.trim() === "") {
          tbody.innerHTML = `
            <tr>
              <td colspan="4" class="text-center py-5">
                <i class="bi bi-keyboard fs-1 mb-3 d-block" style="color: #113620;"></i>
                <span style="color: #8bb39b; font-size: 1.1rem;">Ketik nama barang untuk memunculkan data...</span>
              </td>
            </tr>`;
        } else {
          tbody.innerHTML = `
            <tr>
              <td colspan="4" class="text-center py-5">
                <i class="bi bi-search fs-1 mb-3 d-block" style="color: #113620;"></i>
                <span style="color: #8bb39b; font-size: 1.1rem;">Barang tidak ditemukan.</span>
              </td>
            </tr>`;
        }
        return;
      }

      let htmlKumpulan = "";
      data.forEach(barang => {
        let stokAngka = (barang.stok && !isNaN(barang.stok)) ? Number(barang.stok) : 0;
        let badgeStok = stokAngka > 0 
          ? `<span class="badge badge-stok-ada rounded-pill px-3 py-2"><i class="bi bi-check-circle-fill me-1"></i>${stokAngka}</span>` 
          : `<span class="badge badge-stok-habis rounded-pill px-3 py-2"><i class="bi bi-x-circle-fill me-1"></i>Habis</span>`;

        let teksHarga = (barang.harga && !isNaN(barang.harga) && barang.harga !== "") 
          ? `Rp ${Number(barang.harga).toLocaleString('id-ID')}` 
          : `<span style="color:#4b6b58;">-</span>`;

        let teksSatuan = (barang.satuan && barang.satuan.trim() !== "") ? barang.satuan : "-";

        htmlKumpulan += `
          <tr>
            <td class="nama-barang text-wrap">${barang.nama}</td>
            <td class="text-center kolom-satuan">${teksSatuan}</td>
            <td class="text-end harga-text">${teksHarga}</td>
            <td class="text-center">${badgeStok}</td>
          </tr>
        `;
      });
      
      tbody.innerHTML = htmlKumpulan;
    }

    kolomCari.addEventListener('input', function(e) {
      btnClear.style.display = e.target.value.length > 0 ? 'block' : 'none';
      
      clearTimeout(timeoutKetik);
      timeoutKetik = setTimeout(() => {
        prosesDataDanRender();
      }, 300); 
    });

    btnClear.addEventListener('click', function() {
      kolomCari.value = "";
      btnClear.style.display = 'none';
      kolomCari.focus();
      prosesDataDanRender();
    });

  </script>
</body>
</html>
